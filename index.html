<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --muted: #555570;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(0,229,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  header {
    text-align: center;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* Scanner viewport */
  .scanner-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    border: 1px solid var(--border);
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  canvas#overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    z-index: 3;
    pointer-events: none;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--accent);
    border-radius: 2px;
  }
  .corner::before { width: 3px; height: 100%; }
  .corner::after  { width: 100%; height: 3px; }

  .corner.tl { top: 14px; left: 14px; }
  .corner.tr { top: 14px; right: 14px; transform: scaleX(-1); }
  .corner.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
  .corner.br { bottom: 14px; right: 14px; transform: scale(-1); }

  /* Scan line */
  .scan-line {
    position: absolute;
    left: 14px;
    right: 14px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    z-index: 2;
    top: 14px;
    animation: scanMove 2s ease-in-out infinite;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .scan-line.active { opacity: 1; }

  @keyframes scanMove {
    0%   { top: 14px; }
    50%  { top: calc(100% - 16px); }
    100% { top: 14px; }
  }

  /* Idle state overlay */
  .idle-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(10,10,15,0.85);
    z-index: 4;
    transition: opacity 0.4s;
  }
  .idle-overlay.hidden { opacity: 0; pointer-events: none; }

  .idle-icon {
    font-size: 48px;
    line-height: 1;
  }
  .idle-text {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-align: center;
    line-height: 1.6;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    width: 100%;
    justify-content: center;
    font-size: 16px;
  }
  .btn-primary:hover { background: #33eeff; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-stop {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    width: 100%;
    justify-content: center;
  }
  .btn-stop:hover { border-color: #ff4466; color: #ff4466; }

  /* Result card */
  .result-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: none;
    animation: slideUp 0.35s ease;
  }
  .result-card.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    margin-bottom: 10px;
  }

  .result-content {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
    line-height: 1.7;
    background: rgba(0,229,255,0.04);
    border: 1px solid rgba(0,229,255,0.1);
    border-radius: 8px;
    padding: 12px;
  }

  .result-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .btn-action {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    text-align: center;
  }
  .btn-action:hover { border-color: var(--accent); color: var(--accent); }
  .btn-action.open-link {
    background: rgba(0,229,255,0.08);
    border-color: rgba(0,229,255,0.3);
    color: var(--accent);
  }
  .btn-action.open-link:hover { background: rgba(0,229,255,0.16); }

  /* Status bar */
  .status {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-align: center;
    min-height: 16px;
  }
  .status.scanning { color: var(--accent); }
  .status.success { color: #00e676; }
  .status.error { color: #ff4466; }

  /* Success flash */
  .scanner-wrap.found {
    border-color: #00e676;
    box-shadow: 0 0 24px rgba(0,230,118,0.2);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  /* History */
  .history {
    width: 100%;
  }
  .history-title {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 10px;
  }
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
    overflow: hidden;
  }
  .history-item:hover { border-color: var(--accent); color: var(--text); }
  .history-item .hi-icon { flex-shrink: 0; color: var(--accent); }
  .history-item .hi-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-item .hi-time { flex-shrink: 0; font-size: 10px; margin-left: auto; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">✦ PIE Project</div>
    <h1>QR <span>Scanner</span></h1>
    <div class="subtitle">// point & scan any code</div>
  </header>

  <div class="scanner-wrap" id="scannerWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line" id="scanLine"></div>

    <div class="idle-overlay" id="idleOverlay">
      <div class="idle-icon">📷</div>
      <div class="idle-text">Press Start to activate<br>the camera scanner</div>
    </div>
  </div>

  <div class="status" id="status">Ready to scan</div>

  <button class="btn btn-primary" id="startBtn" onclick="startScanner()">
    ▶ Start Camera
  </button>
  <button class="btn btn-stop" id="stopBtn" onclick="stopScanner()" style="display:none;">
    ■ Stop Camera
  </button>

  <div class="result-card" id="resultCard">
    <div class="result-label">✓ Code Detected</div>
    <div class="result-content" id="resultText">—</div>
    <div class="result-actions">
      <button class="btn-action open-link" id="openBtn" onclick="openResult()" style="display:none;">↗ Open Link</button>
      <button class="btn-action" onclick="copyResult()">⎘ Copy</button>
      <button class="btn-action" onclick="clearResult()">✕ Clear</button>
    </div>
  </div>

  <div class="history" id="historySection" style="display:none;">
    <div class="history-title">// Recent scans</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<!-- jsQR from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.js"></script>
<script>
  let stream = null;
  let animFrame = null;
  let lastResult = '';
  let scanning = false;
  const history = [];

  const video    = document.getElementById('video');
  const canvas   = document.getElementById('overlay');
  const ctx      = canvas.getContext('2d', { willReadFrequently: true });
  const status   = document.getElementById('status');
  const scanLine = document.getElementById('scanLine');
  const idleOverlay = document.getElementById('idleOverlay');
  const scannerWrap = document.getElementById('scannerWrap');

  async function startScanner() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      video.play();

      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'flex';
      idleOverlay.classList.add('hidden');
      scanLine.classList.add('active');

      scanning = true;
      setStatus('scanning', '⟳ Scanning for QR codes...');
      tick();
    } catch (e) {
      setStatus('error', '✕ Camera access denied or unavailable');
    }
  }

  function stopScanner() {
    scanning = false;
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    cancelAnimationFrame(animFrame);
    video.srcObject = null;

    document.getElementById('startBtn').style.display = 'flex';
    document.getElementById('stopBtn').style.display = 'none';
    idleOverlay.classList.remove('hidden');
    scanLine.classList.remove('active');
    setStatus('', 'Ready to scan');
  }

  function tick() {
    if (!scanning) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
      if (code && code.data !== lastResult) {
        lastResult = code.data;
        onDetected(code.data);
      }
    }
    animFrame = requestAnimationFrame(tick);
  }

  function onDetected(data) {
    // Flash
    scannerWrap.classList.add('found');
    setTimeout(() => scannerWrap.classList.remove('found'), 800);

    setStatus('success', '✓ QR Code detected!');
    setTimeout(() => { if (scanning) setStatus('scanning', '⟳ Scanning for QR codes...'); }, 2000);

    // Show result
    document.getElementById('resultText').textContent = data;
    document.getElementById('resultCard').classList.add('visible');

    const isUrl = /^https?:\/\//i.test(data);
    document.getElementById('openBtn').style.display = isUrl ? 'block' : 'none';

    // Add to history
    const ts = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    history.unshift({ data, ts, isUrl });
    if (history.length > 5) history.pop();
    renderHistory();

    // Reset last after delay so same code can be re-scanned
    setTimeout(() => { lastResult = ''; }, 4000);
  }

  function setStatus(type, msg) {
    status.className = 'status ' + type;
    status.textContent = msg;
  }

  function openResult() {
    const url = document.getElementById('resultText').textContent;
    window.open(url, '_blank');
  }

  function copyResult() {
    const text = document.getElementById('resultText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.target;
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = '⎘ Copy', 1500);
    });
  }

  function clearResult() {
    document.getElementById('resultCard').classList.remove('visible');
    lastResult = '';
  }

  function renderHistory() {
    const sec  = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    if (history.length === 0) { sec.style.display = 'none'; return; }
    sec.style.display = 'block';
    list.innerHTML = history.map(h => `
      <div class="history-item" onclick="showHistoryItem('${encodeURIComponent(h.data)}')">
        <span class="hi-icon">${h.isUrl ? '🔗' : '📄'}</span>
        <span class="hi-text">${h.data}</span>
        <span class="hi-time">${h.ts}</span>
      </div>
    `).join('');
  }

  function showHistoryItem(encoded) {
    const data = decodeURIComponent(encoded);
    document.getElementById('resultText').textContent = data;
    document.getElementById('resultCard').classList.add('visible');
    const isUrl = /^https?:\/\//i.test(data);
    document.getElementById('openBtn').style.display = isUrl ? 'block' : 'none';
  }
</script>
</body>
</html>
